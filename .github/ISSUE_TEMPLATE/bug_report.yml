name: Bug report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check [open issues](../issues) to see if it's already reported.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the editor
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Are you using the live demo or a self-hosted instance?
      placeholder: https://resume-editor.asaa.dev/ or localhost:3000

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else that might help.
